<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row">
        <div class="col-md-5">
            
            <div class="card p-4 shadow-sm mb-4">
                <h4 class="mb-3">Create Category</h4>
                <form id="categoryForm">
                    <div class="mb-3">
                        <label class="form-label">Category Name</label>
                        <input type="text" class="form-control" id="catName" placeholder="e.g., Electronics" required>
                    </div>
                    <button type="submit" class="btn btn-secondary w-100">Add Category</button>
                </form>
            </div>

            <div class="card p-4 shadow-sm mb-5">
                <h4 class="mb-3">Add New Product</h4>
                <form id="productForm">
                    <div class="mb-3">
                        <label class="form-label">Product Title</label>
                        <input type="text" class="form-control" id="title" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Price</label>
                        <input type="number" class="form-control" id="price" step="0.01" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select class="form-select" id="productCategory" required>
                            <option value="">-- Select a Category --</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Product Image</label>
                        <input type="file" class="form-control" id="image" accept="image/*">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Save Product</button>
                </form>
            </div>
        </div>

        <div class="col-md-7">
            <h2 class="mb-4">Inventory List</h2>
            <table class="table table-striped table-hover shadow-sm bg-white rounded">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Image</th>
                        <th>Title</th>
                        <th>Category</th> <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // UPDATED: Initialize dashboard data streams on load
    document.addEventListener("DOMContentLoaded", () => {
        loadCategories();
        loadProducts();
    });

    // 1. ADDED: Fetch and Populate Categories in the Dropdown Selector
    function loadCategories() {
        fetch('/api/categories')
            .then(response => response.json())
            .then(categories => {
                const select = document.getElementById('productCategory');
                select.innerHTML = '<option value="">-- Select a Category --</option>';
                categories.forEach(cat => {
                    select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
                });
            });
    }

    // 2. UPDATED: Fetch and Display Data (Includes Category Column)
    function loadProducts() {
        fetch('/api/products')
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('productTableBody');
                tbody.innerHTML = '';
                data.forEach(product => {
                    tbody.innerHTML += `
                        <tr class="align-middle">
                            <td>${product.id}</td>
                            <td>
                                ${product.imageUrl ? `<img src="${product.imageUrl}" width="50" class="rounded img-thumbnail">` : '<span class="text-muted">No Image</span>'}
                            </td>
                            <td>${product.title}</td>
                            <td><span class="badge bg-info text-dark">${product.category ? product.category.name : 'Unassigned'}</span></td>
                            <td>$${product.price.toFixed(2)}</td>
                            <td>
                                <button class="btn btn-sm btn-danger" onclick="deleteProduct(${product.id})">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            });
    }

    // 3. ADDED: Handle Category Form Submission (JSON Payload)
    document.getElementById('categoryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const categoryName = document.getElementById('catName').value;

        fetch('/api/categories', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: categoryName })
        })
        .then(response => response.json())
        .then(() => {
            document.getElementById('categoryForm').reset();
            loadCategories(); // Refresh relational dropdown element list options
        })
        .catch(error => console.error('Error saving category:', error));
    });

    // 4. UPDATED: Handle Product Form Submission (Appends relationship context)
    document.getElementById('productForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const formData = new FormData();
        formData.append('title', document.getElementById('title').value);
        formData.append('price', document.getElementById('price').value);
        formData.append('categoryId', document.getElementById('productCategory').value); // UPDATED: Link foreign key
        
        const imageFile = document.getElementById('image').files[0];
        if (imageFile) {
            formData.append('image', imageFile);
        }

        fetch('/api/products', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(() => {
            document.getElementById('productForm').reset();
            loadProducts(); // Refresh table visual data rows
        })
        .catch(error => console.error('Error saving product:', error));
    });

    // 5. Delete Product Record
    function deleteProduct(id) {
        if(confirm("Are you sure?")) {
            fetch(`/api/products/${id}`, { method: 'DELETE' })
                .then(() => loadProducts());
        }
    }
</script>

</body>
</html>
